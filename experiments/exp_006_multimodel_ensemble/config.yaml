experiment_id: exp_006_multimodel_ensemble
base_experiment: exp_004_threshold_80
hypothesis: >
  단일 LightGBM 대비 이종 모델(XGBoost/CatBoost/RF/HistGB/LogReg) 비교와
  soft-voting + stacking 앙상블로 일반화 성능·강건성을 높이고,
  앙상블 위험확률을 추천시스템의 신뢰 기반 점수로 사용한다.
seed: 42
n_folds: 5
label:
  danger_threshold: 0.80   # 전세가율 >= 0.80 → 위험 (exp_004 동일)
  safe_threshold: 0.60     # 전세가율 <= 0.60 → 안전
models:
  lightgbm:
    num_leaves: 31
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    is_unbalance: true
    num_boost_round: 500
    early_stopping: 50
  xgboost:
    max_depth: 7
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    n_estimators: 500
    early_stopping: 50
  catboost:
    depth: 7
    learning_rate: 0.05
    iterations: 500
    early_stopping: 50
  random_forest:
    n_estimators: 300
    max_depth: 16
  hist_gb:
    max_iter: 400
    learning_rate: 0.06
  logistic:
    C: 1.0
    max_iter: 2000
ensemble:
  voting: [lightgbm, xgboost, catboost, hist_gb]
  stacking_meta: logistic
metric: AUC (5-fold OOF) + F1
